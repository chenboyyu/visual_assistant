<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>視覺助理 - 無障礙大按鈕版</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 12px;
            padding-bottom: 220px; /* 為下方大按鈕預留空間 */
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        h1 {
            font-size: 1.2rem;
            color: #00d4ff;
            margin-bottom: 12px;
            text-align: center;
        }
        .container {
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        video, canvas { display: none; }

        /* 下方固定按鈕區 */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #111;
            padding: 15px;
            display: flex;
            gap: 12px;
            border-top: 2px solid #333;
            z-index: 100;
        }

        .bottom-nav button {
            flex: 1;
            height: 150px; /* 大幅增加高度 */
            border: 4px solid transparent;
            border-radius: 20px;
            cursor: pointer;
            font-size: 1.6rem; /* 加大字體 */
            font-weight: 900;
            transition: all 0.1s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            line-height: 1.2;
        }

        .bottom-nav button span {
            font-size: 2.5rem;
            margin-bottom: 8px;
        }

        #captureBtn { background: #00d4ff; color: #000; }
        #askBtn { background: #7c3aed; color: #fff; }
        #speakBtn { background: #0ea5e9; color: #fff; }

        button:focus { outline: 6px solid #fbbf24; outline-offset: -6px; }
        button:active { transform: scale(0.92); }
        button:disabled { opacity: 0.2; }

        /* 回覆顯示區 */
        #response {
            background: #1a1a1a;
            border-radius: 15px;
            padding: 20px;
            min-height: 150px;
            font-size: 1.3rem; /* 讓字大一點好讀 */
            line-height: 1.6;
            color: #fff;
            border: 2px solid #444;
        }

        #question {
            width: 100%;
            padding: 15px;
            border: 2px solid #333;
            border-radius: 10px;
            background: #111;
            color: #eee;
            font-size: 1.1rem;
        }

        #status {
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            font-size: 1rem;
            font-weight: bold;
        }
        .loading { background: #fbbf24; color: #000; }
        .error   { background: #ef4444; color: #fff; }
        .success { background: #22c55e; color: #fff; }

        /* API 與 檔案設定區 (縮小一點，因為不常用) */
        .settings-area {
            background: #111;
            padding: 10px;
            border-radius: 10px;
            margin-top: 10px;
            font-size: 0.9rem;
        }
        .api-row { display: flex; gap: 8px; margin-top: 5px; }
        .api-row input { flex: 1; padding: 10px; background: #000; color: #fff; border: 1px solid #444; border-radius: 5px; }
        
        .file-label {
            display: block;
            text-align: center;
            padding: 15px;
            background: #222;
            border: 1px dashed #666;
            border-radius: 10px;
            margin: 10px 0;
            color: #aaa;
        }
        .file-label input { display: none; }

        .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }
    </style>
</head>
<body>
    <h1>視覺助理 - 無障礙版</h1>

    <div class="container">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas"></canvas>

        <div id="status">準備就緒</div>

        <div id="response" tabindex="0">點擊下方「擷取畫面」開始</div>

        <input type="text" id="question" value="這張圖片裡有什麼？請用繁體中文簡短回答" aria-label="詢問的問題">

        <!-- 設定區 -->
        <div class="settings-area">
            <label class="file-label">
                📁 或從檔案選擇圖片
                <input type="file" id="fileInput" accept="image/*">
            </label>
            
            <label for="apiKey">Gemini API Key:</label>
            <div class="api-row">
                <input type="password" id="apiKey" placeholder="在此輸入 API Key">
                <a href="https://aistudio.google.com/api-keys" target="_blank" style="color:#4285f4; text-decoration:none;">取得 Key</a>
            </div>
        </div>
    </div>

    <!-- 底部超大按鈕區 -->
    <div class="bottom-nav">
        <button id="captureBtn"><span>📷</span>擷取<br>畫面</button>
        <button id="askBtn" disabled><span>🤔</span>詢問<br>圖片</button>
        <button id="speakBtn" disabled><span>🔊</span>朗讀<br>回覆</button>
    </div>

    <script>
        (function(){
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const captureBtn = document.getElementById('captureBtn');
            const askBtn = document.getElementById('askBtn');
            const speakBtn = document.getElementById('speakBtn');
            const question = document.getElementById('question');
            const status = document.getElementById('status');
            const responseDiv = document.getElementById('response');
            const apiKeyInput = document.getElementById('apiKey');
            const fileInput = document.getElementById('fileInput');

            let capturedImage = null;
            let lastResponse = '';
            let apiKey = '';
            let modelName = 'gemini-1.5-flash'; // 修正模型名稱
            let webcamStream = null;

            function speak(text, callback) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'zh-TW';
                if (callback) utterance.onend = callback;
                window.speechSynthesis.speak(utterance);
            }

            function setStatus(msg, type) {
                status.textContent = msg;
                status.className = type || '';
            }

            async function initWebcam() {
                try {
                    webcamStream = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: 'environment', width: { ideal: 1280 } }
                    });
                    video.srcObject = webcamStream;
                    await video.play();
                    setStatus('相機已啟動', 'success');
                } catch (err) {
                    setStatus('相機錯誤：' + err.message, 'error');
                }
            }

            captureBtn.addEventListener('click', () => {
                if (!video.videoWidth) return;
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                capturedImage = canvas.toDataURL('image/jpeg', 0.85);
                askBtn.disabled = false;
                setStatus('圖片已擷取', 'success');
                speak('圖片已擷取');
            });

            fileInput.addEventListener('change', (e) => {
                if (e.target.files[0]) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        capturedImage = event.target.result;
                        askBtn.disabled = false;
                        setStatus('檔案已載入', 'success');
                        speak('圖片已載入');
                    };
                    reader.readAsDataURL(e.target.files[0]);
                }
            });

            apiKeyInput.addEventListener('input', (e) => apiKey = e.target.value.trim());

            async function askGemini() {
                if (!capturedImage || !apiKey) {
                    const msg = !apiKey ? '請先輸入 API Key' : '請先擷取圖片';
                    setStatus(msg, 'error');
                    speak(msg);
                    return;
                }

                setStatus('分析中...', 'loading');
                responseDiv.textContent = '正在分析圖片，請稍候...';
                askBtn.disabled = true;
                speak('正在分析');

                const base64Data = capturedImage.split(',')[1];
                const payload = {
                    contents: [{
                        parts: [
                            { text: question.value + ' 請用繁體中文回答，兩句話以內。' },
                            { inline_data: { mime_type: 'image/jpeg', data: base64Data } }
                        ]
                    }]
                };

                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    const data = await res.json();
                    lastResponse = data.candidates[0].content.parts[0].text;
                    responseDiv.textContent = lastResponse;
                    speakBtn.disabled = false;
                    setStatus('分析完成', 'success');
                    speak(lastResponse);
                } catch (err) {
                    setStatus('API 錯誤', 'error');
                    responseDiv.textContent = '發生錯誤：' + err.message;
                    speak('分析失敗');
                } finally {
                    askBtn.disabled = false;
                }
            }

            askBtn.addEventListener('click', askGemini);
            speakBtn.addEventListener('click', () => speak(lastResponse));

            // 啟動
            initWebcam();
            setTimeout(() => speak('視覺助理已啟動，按鈕在螢幕最下方'), 1000);
        })();
    </script>
</body>
</html>
